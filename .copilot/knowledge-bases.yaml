# Configuration Reference:
# ========================
#
# knowledge_bases:
#   - name: <unique-identifier>
#     description: "<human-readable description>"
#     folders:
#       - path: <relative-path-from-repo-root>
#         type: <markdown|pdf|text>
#       - path: <another-path>
#         type: <markdown|pdf|text>
#
# Fields:
#   name (required)        : Unique identifier for the knowledge base (kebab-case)
#   description (required) : What this knowledge base covers
#   folders (required)     : List of folders to search
#     path (required)      : Relative path from repository root
#     type (required)      : File type - markdown, pdf, or text
#
# Supported File Types:
#   - markdown : .md files (including .mdx, .markdown)
#   - pdf      : .pdf files (requires PDF parsing capability)
#   - text     : Plain text files (.txt, .doc, .log, etc)
#
# Notes:
#   - Paths are relative to the repository root
#   - Use forward slashes even on Windows (they'll be converted)
#   - The agent searches all files in specified folders recursively
#   - Files are indexed and searched alongside web sources
#   - Query results show source file name and location for reference
